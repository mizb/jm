services:
  jmcomic-api:
    build:
      context: .
    image: jmcomic-api:local
    container_name: jmcomic-api
    ports:
      - "8088:8088"
    environment:
      JM_API_VERSION: "2026.07.17.7"
      JM_REQUEST_BUDGET_MS: "${JM_REQUEST_BUDGET_MS:-12000}"
      JM_MAX_UPSTREAM_ATTEMPTS: "${JM_MAX_UPSTREAM_ATTEMPTS:-15}"
      JM_LIST_CACHE_TTL: "${JM_LIST_CACHE_TTL:-60}"
      JM_SEARCH_CACHE_TTL: "${JM_SEARCH_CACHE_TTL:-30}"
      JM_WEEKLY_LIST_CACHE_TTL: "${JM_WEEKLY_LIST_CACHE_TTL:-60}"
      JM_ALBUM_CACHE_TTL: "${JM_ALBUM_CACHE_TTL:-45}"
      JM_WEEK_DEFAULTS_CACHE_TTL: "${JM_WEEK_DEFAULTS_CACHE_TTL:-600}"
      JM_WEEK_DEFAULTS_STALE_TTL: "${JM_WEEK_DEFAULTS_STALE_TTL:-3600}"
      JM_CACHE_FILL_WAIT_MS: "${JM_CACHE_FILL_WAIT_MS:-750}"
      JM_CACHE_FILL_LOCK_TTL: "${JM_CACHE_FILL_LOCK_TTL:-15}"
      JM_DOMAIN_FRESH_TTL: "${JM_DOMAIN_FRESH_TTL:-86400}"
      JM_DOMAIN_STALE_TTL: "${JM_DOMAIN_STALE_TTL:-86400}"
      JM_DOMAIN_REFRESH_DEFERRED: "${JM_DOMAIN_REFRESH_DEFERRED:-1}"
      JM_DOMAIN_SOURCE_TIMEOUT_MS: "${JM_DOMAIN_SOURCE_TIMEOUT_MS:-1500}"
      JM_DOMAIN_REFRESH_BUDGET_MS: "${JM_DOMAIN_REFRESH_BUDGET_MS:-3000}"
      JM_DOMAIN_REFRESH_FAILURE_TTL: "${JM_DOMAIN_REFRESH_FAILURE_TTL:-60}"
      JM_PREFETCH_PAGES: "${JM_PREFETCH_PAGES:-10}"
      JM_PREFETCH_HIGH_PRIORITY_PAGES: "${JM_PREFETCH_HIGH_PRIORITY_PAGES:-2}"
      JM_PREFETCH_WALL_BUDGET_MS: "${JM_PREFETCH_WALL_BUDGET_MS:-5000}"
      JM_PREFETCH_BYTE_BUDGET: "${JM_PREFETCH_BYTE_BUDGET:-16777216}"
      JM_PREFETCH_MAX_ACTIVE: "${JM_PREFETCH_MAX_ACTIVE:-2}"
      JM_PREFETCH_MIN_FREE_BYTES: "${JM_PREFETCH_MIN_FREE_BYTES:-33554432}"
      JM_PREFETCH_MIN_FREE_RATIO: "${JM_PREFETCH_MIN_FREE_RATIO:-15}"
      JM_PAGE_CACHE_TTL: "3600"
      JM_CHAPTER_CACHE_TTL: "21600"
      JM_PAGE_CACHE_MAX_ITEM_BYTES: "104857600"
      JM_PAGE_CACHE_MIN_FREE_BYTES: "16777216"
      JM_PAGE_CACHE_MIN_FREE_RATIO: "8"
      JM_SINGLEFLIGHT_LOCK_TTL: "30"
      JM_SINGLEFLIGHT_WAIT_MS: "5000"
      JM_NEXT_CHAPTER_PREFETCH: "1"
      JM_NEXT_CHAPTER_PREFETCH_PAGES: "2"
      JM_DOMAIN_COOLDOWN_SECONDS: "120"
      JM_DOMAIN_STATS_TTL: "21600"
      JM_IMAGE_MAX_COMPRESSED_BYTES: "${JM_IMAGE_MAX_COMPRESSED_BYTES:-33554432}"
      JM_IMAGE_MAX_PIXELS: "${JM_IMAGE_MAX_PIXELS:-80000000}"
      JM_CDN_EPOCH: "${JM_CDN_EPOCH:-1}"
      JM_TRUSTED_PROXY_CIDRS: "${JM_TRUSTED_PROXY_CIDRS:-}"
      PHP_CLI_SERVER_WORKERS: "10"
    restart: unless-stopped
